<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Muhammad Younis - Senior Flutter Developer Portfolio. Explore my cross-platform mobile, web, and desktop projects.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%2354C5F8%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2270%22%20font-size%3D%2260%22%20font-family%3D%22sans-serif%22%20font-weight%3D%22bold%22%20fill%3D%22white%22%20text-anchor%3D%22middle%22%3EM%3C%2Ftext%3E%3C%2Fsvg%3E" />

  <title>Muhammad Younis | Portfolio</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0A192F;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    #skeleton-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0A192F;
      display: flex;
      flex-direction: column;
      padding: 40px;
      box-sizing: border-box;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #skeleton-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .shimmer {
      background: #112240;
      background-image: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0,
        rgba(84, 197, 248, 0.05) 20%, /* Primary color tint */
        rgba(84, 197, 248, 0.1) 60%,
        rgba(255, 255, 255, 0)
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-header {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      width: 100%;
      z-index: 10;
    }

    .skeleton-nav-pill {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 24px;
      background: rgba(17, 34, 64, 0.4);
      border: 1px solid rgba(84, 197, 248, 0.15);
      border-radius: 40px;
      backdrop-filter: blur(10px);
    }

    .skeleton-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      margin-right: 12px;
    }

    .skeleton-nav-item {
      width: 70px;
      height: 14px;
      border-radius: 4px;
    }

    .skeleton-nav-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-left: 12px;
    }

    .skeleton-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 160px auto auto auto;
      width: 100%;
      padding: 0 40px;
      box-sizing: border-box;
    }

    .skeleton-hero-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 60px;
    }

    .skeleton-freelance {
      width: 240px;
      height: 34px;
      border-radius: 20px;
      margin-bottom: 40px;
    }

    .skeleton-hi {
      width: 120px;
      height: 18px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    .skeleton-title {
      width: 520px;
      height: 72px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .skeleton-subtitle {
      width: 480px;
      height: 44px;
      border-radius: 8px;
      margin-bottom: 32px;
    }

    .skeleton-paragraph {
      width: 500px;
      height: 70px;
      border-radius: 8px;
      margin-bottom: 40px;
    }

    .skeleton-buttons {
      display: flex;
      gap: 16px;
    }

    .skeleton-btn-1 {
      width: 160px;
      height: 48px;
      border-radius: 8px;
    }

    .skeleton-btn-2 {
      width: 120px;
      height: 48px;
      border-radius: 8px;
      background: transparent;
      border: 2px solid rgba(84, 197, 248, 0.2);
    }

    .skeleton-hero-image {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 2px solid rgba(84, 197, 248, 0.2);
      box-shadow: 0 0 80px rgba(84, 197, 248, 0.1);
    }

    @media (max-width: 800px) {
      .skeleton-nav {
        display: none;
      }
      .skeleton-hero {
        flex-direction: column-reverse;
        justify-content: center;
        text-align: center;
        gap: 40px;
      }
      .skeleton-hero-image {
        width: 250px;
        height: 250px;
        margin: 0 auto;
      }
      .skeleton-title {
        width: 80%;
        margin: 0 auto;
      }
      .skeleton-subtitle {
        width: 60%;
        margin: 0 auto;
      }
      .skeleton-paragraph {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="skeleton-loader">
    <div class="skeleton-header">
      <div class="skeleton-nav-pill">
        <div class="shimmer skeleton-logo"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-item"></div>
        <div class="shimmer skeleton-nav-circle"></div>
      </div>
    </div>
    <div class="skeleton-hero">
      <div class="skeleton-hero-text">
        <div class="shimmer skeleton-freelance"></div>
        <div class="shimmer skeleton-hi"></div>
        <div class="shimmer skeleton-title"></div>
        <div class="shimmer skeleton-subtitle"></div>
        <div class="shimmer skeleton-paragraph"></div>
        <div class="skeleton-buttons">
          <div class="shimmer skeleton-btn-1"></div>
          <div class="shimmer skeleton-btn-2"></div>
        </div>
      </div>
      <div class="shimmer skeleton-hero-image"></div>
    </div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
